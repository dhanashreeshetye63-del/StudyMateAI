<!DOCTYPE html>
<html>
<head>

<title>AI Tutor</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🤖 AI Tutor</h1>

<form method="POST">

<input
type="text"
name="question"
placeholder="Ask your study question..."
required>

<br>

<button type="submit">Ask AI</button>

</form>

{% if answer %}

<div class="answer">

<h3>AI Response</h3>

<p>{{answer}}</p>

</div>

{% endif %}

</div>

</body>
</html>
